<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit KPI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; color: #2d3748; }
    .wrap { max-width: 900px; margin: 0 auto; }
    h1 { font-size: 22px; margin-bottom: 6px; }
    .subtitle { color: #4a5568; margin-bottom: 18px; }
    label { font-weight: 600; display: block; margin-top: 14px; }
    textarea, input[type="text"] {
      width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px;
      font-size: 14px; color: #2d3748; background: #fff;
    }
    textarea { min-height: 90px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .actions { margin-top: 18px; display: flex; gap: 10px; }
    .btn { cursor: pointer; border: 0; padding: 10px 14px; border-radius: 6px; color: #fff; font-weight: 600; }
    .btn-save { background: #2f855a; }
    .btn-cancel { background: #718096; }
    .msg { margin-top: 12px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Edit KPI</h1>
    <div class="subtitle" id="kpi-title"></div>

    <label for="description">Description</label>
    <textarea id="description" placeholder="Describe the KPI in one or two sentences"></textarea>

    <label for="objective">Objective</label>
    <textarea id="objective" placeholder="What this KPI aims to drive or control"></textarea>

    <label for="input_measure">Input Measure</label>
    <textarea id="input_measure" placeholder="What inputs/measurements feed this KPI"></textarea>

    <div class="row">
      <div>
        <label for="unit_of_measure">Unit of Measure</label>
        <input id="unit_of_measure" type="text" placeholder="%, tons/day, ratio, dimensionless, etc.">
      </div>
      <div>
        <label for="reporting_source">Reporting Source</label>
        <input id="reporting_source" type="text" placeholder="Historian, MES, Lab LIMS, ERP, etc.">
      </div>
    </div>

    <label for="comments">Comments</label>
    <textarea id="comments" placeholder="Special considerations or notes"></textarea>

    <div class="actions">
      <button class="btn btn-save" id="saveBtn">Save</button>
      <button class="btn btn-cancel" onclick="window.close(); return false;">Close</button>
    </div>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const kpiName = params.get('kpi') || '';
    document.getElementById('kpi-title').textContent = kpiName ? kpiName : 'No KPI specified';

    async function loadOverrides() {
      if (!kpiName) return;
      const res = await fetch(`/overrides/${encodeURIComponent(kpiName)}`);
      if (!res.ok) return;
      const data = await res.json();
      for (const [k, v] of Object.entries(data || {})) {
        const el = document.getElementById(k);
        if (el) el.value = v;
      }
    }

    async function save() {
      const payload = {
        kpi_name: kpiName,
        fields: {
          description: document.getElementById('description').value,
          objective: document.getElementById('objective').value,
          input_measure: document.getElementById('input_measure').value,
          unit_of_measure: document.getElementById('unit_of_measure').value,
          reporting_source: document.getElementById('reporting_source').value,
          comments: document.getElementById('comments').value
        }
      };
      const res = await fetch('/overrides', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      const msg = document.getElementById('msg');
      if (res.ok) {
        msg.textContent = 'Saved. Regenerate the Bluebook to apply changes.';
        msg.style.color = '#2f855a';
      } else {
        const err = await res.json().catch(() => ({}));
        msg.textContent = 'Failed to save: ' + (err.error || res.statusText);
        msg.style.color = '#c53030';
      }
    }

    document.getElementById('saveBtn').addEventListener('click', save);
    loadOverrides();
  </script>
</body>
</html>
